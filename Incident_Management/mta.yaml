_schema-version: 3.3.0
ID: Incident_Management
description: A simple CAP project.
version: 1.0.0
modules:
- name: Incident_Management-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: Incident_Management-auth
  - name: Incident_Management-db
  - name: Incident_Management-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: Incident_Management-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: Incident_Management-db
  parameters:
    buildpack: nodejs_buildpack
- name: Incident_Management-app-deployer
  type: com.sap.application.content
  path: gen
  requires:
  - name: Incident_Management-auth
  - name: srv-api
  - name: Incident_Management-html5-repo-host
    parameters:
      config:
        HTML5Runtime_enabled: true
      content-target: true
  build-parameters:
    build-result: app/
    requires:
    - artifacts:
      - incidents.zip
      name: Incident_Managementincidents
      target-path: app/
- name: Incident_Managementincidents
  type: html5
  path: app/incidents
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm ci
    - npm run build
    supported-platforms: []
- name: Incident_Management-destinations
  type: com.sap.application.content
  requires:
  - name: Incident_Management-auth
    parameters:
      service-key:
        name: Incident_Management-auth-key
  - name: Incident_Management-html5-repo-host
    parameters:
      service-key:
        name: Incident_Management-html5-repo-host-key
  - name: srv-api
  - name: Incident_Management-destination
    parameters:
      content-target: true
  parameters:
    content:
      instance:
        destinations:
        - Name: Incident_Management-html5-repository
          ServiceInstanceName: Incident_Management-html5-repo-host
          ServiceKeyName: Incident_Management-html5-repo-host-key
          sap.cloud.service: Incident_Management.service
        - Authentication: OAuth2UserTokenExchange
          Name: Incident_Management-auth
          ServiceInstanceName: Incident_Management-auth
          ServiceKeyName: Incident_Management-auth-key
          sap.cloud.service: Incident_Management.service
        existing_destinations_policy: update
  build-parameters:
    no-source: true
- name: Incident_Management-approuter
  type: nodejs
  path: approuter
  requires:
  - name: Incident_Management-auth
  - name: Incident_Management-destination
  - name: srv-api
  parameters:
    memory: 256M
resources:
- name: Incident_Management-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      role-collections:
      - description: generated
        name: support (Incident_Management ${org}-${space})
        role-template-references:
        - $XSAPPNAME.support
      - description: generated
        name: admin (Incident_Management ${org}-${space})
        role-template-references:
        - $XSAPPNAME.admin
      tenant-mode: dedicated
      xsappname: Incident_Management-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: Incident_Management-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: Incident_Management-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
    service: destination
    service-plan: lite
  requires:
  - name: srv-api
- name: Incident_Management-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
